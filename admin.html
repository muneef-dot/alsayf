<div class="nav-item" onclick="showTree()" id="nav-tree">
    <span class="nav-icon">🌳</span> شجرة العائلة
</div>

<div id="sec-tree" class="hidden">
    <div class="topbar">
        <h1>شجرة العائلة التفاعلية</h1>
        <button class="btn btn-outline" onclick="generateReport()">📄 تصدير تقرير PDF</button>
    </div>
    <div class="section">
        <div class="section-hd"><span>🌳</span><h2>تسلسل الأجيال</h2></div>
        <div id="tree-container" style="padding:2rem; overflow-x:auto;">
            </div>
    </div>
</div>

<script>
// أضف هذه الدوال في نهاية سكربت admin.html
function showTree() {
    showSection('tree'); // تأكد من إضافة 'tree' في قائمة showSection
    const container = document.getElementById('tree-container');
    container.innerHTML = drawTree(DB);
}

function drawTree(data) {
    // خوارزمية بسيطة لترتيب الأجيال (رب الأسرة -> أبناؤه)
    let html = '<div style="display:flex; flex-direction:column; gap:20px;">';
    const heads = data.filter(f => !f.members.some(m => m.name === f.headName)); // افتراض الأب
    heads.forEach(f => {
        html += `<div style="border-right: 2px solid var(--gold); padding-right: 15px;">
                    <div style="font-weight:bold; color:var(--text)">${f.headName}</div>`;
        (f.members || []).forEach(m => {
            html += `<div style="margin-right:20px; padding:5px; border-bottom:1px solid #eee;">${m.name} (${m.relation})</div>`;
        });
        html += `</div>`;
    });
    html += '</div>';
    return html;
}

function generateReport() {
    // دالة بسيطة لطباعة الجدول العربي (الذي برمجناه في التحديث الأخير)
    window.print();
}
</script>
