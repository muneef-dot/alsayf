<!-- أضف هذا الرابط في قائمة nav-item داخل admin.html -->
<div class="nav-item" onclick="showTree()" id="nav-tree">
    <span class="nav-icon">🌳</span> شجرة العائلة
</div>

<!-- أضف هذا السكشن في الـ main-content داخل admin.html -->
<div id="sec-tree" class="hidden">
    <div class="topbar"><h1>شجرة العائلة التفاعلية</h1></div>
    <div class="section">
        <div class="section-hd"><h2>تسلسل الأجيال</h2></div>
        <div id="tree-container" style="padding:2rem; background:white;"></div>
    </div>
</div>

<script>
// أضف هذه الدالة في سكربت admin.html
function showTree() {
    showSection('tree');
    const container = document.getElementById('tree-container');
    let html = '<div style="font-family:Cairo; direction:rtl;">';
    
    // ربط الأبناء بآبائهم
    DB.forEach(f => {
        html += `<div style="margin-bottom:20px; border-right:4px solid var(--gold); padding-right:15px;">
                 <h3 style="color:var(--dark)">${f.headName}</h3>`;
        const children = DB.filter(x => x.members && x.members.some(m => m.fatherName === f.headName));
        children.forEach(child => {
            html += `<div style="margin-right:30px; padding:5px; border-bottom:1px solid #ddd;">${child.headName}</div>`;
        });
        html += `</div>`;
    });
    
    html += '</div>';
    container.innerHTML = html;
}
</script>
