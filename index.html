<!-- تم إضافة حقل "اسم الأب" في صفحة إضافة الأفراد لربط الشجرة -->
<script>
// ... (اترك الدوال السابقة كما هي) ...

// استبدل دالة renderMembers بهذا الكود المطور ليشمل خانة "اسم الأب"
function renderMembers() {
  const rels = ['ابن','ابنة','زوجة','زوج','أب','أم','أخ','أخت','حفيد','حفيدة','عم','عمة','خال','خالة'];
  document.getElementById('members-list').innerHTML = memberList.map((m, i) => `
    <div class="member-block" id="mb-${i}">
      <div class="mb-header">
        <span class="member-num">الفرد ${i + 1}</span>
        <button class="rm-btn" onclick="removeMember(${i})">✕ حذف</button>
      </div>
      <div class="fg" style="gap:12px">
        <div class="fl">
          <label>الاسم<span class="req">*</span></label>
          <input id="m-name-${i}" value="${m.name}" oninput="memberList[${i}].name=this.value.trim()">
        </div>
        <div class="fl">
          <label>اسم الأب (لربط الشجرة)</label>
          <input value="${m.fatherName||''}" placeholder="اكتب اسم الأب هنا" oninput="memberList[${i}].fatherName=this.value.trim()">
        </div>
        <div class="fl">
          <label>صلة القرابة</label>
          <select onchange="memberList[${i}].relation=this.value">
            <option value="">اختر...</option>
            ${rels.map(r => `<option ${m.relation === r ? 'selected' : ''}>${r}</option>`).join('')}
          </select>
        </div>
        <!-- ... باقي الأكواد كما هي ... -->
      </div>
    </div>
  `).join('');
}
</script>
